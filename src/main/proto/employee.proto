syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.employees";
option java_outer_classname = "EmployeeProto";

service EmpService {
  rpc CreateEmp (EmpRequest) returns (EmpResponse);
  rpc GetEmpById (EmpIdRequest) returns (EmpResponse);
  rpc UpdateEmp (EmpRequest) returns (EmpResponse);
  rpc DeleteEmp (EmpIdRequest) returns (DeleteResponse);
  rpc GetAllEmps (Empty) returns (EmpListResponse);
  rpc GetAllEmpsStream (Empty) returns (stream EmpResponse);
  rpc SaveMulipleEmployeeAsStream(stream EmpRequest) returns (UploadStatus);
  rpc GetEmployeeByIdStream(stream EmpIdRequest) returns (stream EmpStreamResponse);
}

message EmpStreamResponse {
  int64 id = 1;
  string name = 2;
  string email = 3;
  string status = 5; // For "Not Found" or "Success"
}

message EmpRequest {
  int64 id = 1;
  string name = 2;
  string email = 3;
}

message EmpResponse {
  int64 id = 1;
  string name = 2;
  string email = 3;
}

message EmpIdRequest {
  int64 id = 1;
}

message DeleteResponse {
  string message = 1;
}

message EmpListResponse {
  repeated EmpResponse employees = 1;
}

message Empty {}

message UploadStatus {
  string message = 1;
  int32 count = 2;
}
